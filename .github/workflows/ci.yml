name: CI — Lint & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Backend: lint + unit tests ─────────────────────────────────
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: accentiq_test
          MYSQL_USER: pronunciation
          MYSQL_PASSWORD: testpassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --quiet --eval \"db.adminCommand('ping').ok\""
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: backend

    env:
      APP_ENV: development
      JWT_SECRET: ci_test_secret_32_chars_minimum_x
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      MYSQL_USER: pronunciation
      MYSQL_PASSWORD: testpassword
      MYSQL_DATABASE: accentiq_test
      MONGO_URI: mongodb://127.0.0.1:27017
      MONGO_DATABASE: accentiq_test
      STORAGE_BACKEND: local
      STORAGE_LOCAL_ROOT: /tmp/pronunciation_test_storage
      EMAIL_CONSOLE_FALLBACK: "true"
      PRIVACY_POLICY_VERSION: "1.0"
      ANONYMOUS_FREE_ANALYSES: "3"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with ruff
        run: ruff format --check .

      - name: Run tests
        run: pytest --cov=app --cov-report=term-missing -v

  # ── Frontend: lint + build ─────────────────────────────────────
  frontend:
    name: Frontend (Node 20 — React JS)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npm run lint

      - name: Build (validates bundling)
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8000
