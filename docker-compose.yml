version: "3.9"

services:
  # ── MySQL ─────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: pronunciation_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pronunciation_coach}
      MYSQL_USER: ${MYSQL_USER:-pronunciation}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme_mysql_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app_network

  # ── MongoDB ───────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: pronunciation_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-pronunciation_coach}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app_network

  # ── Backend (FastAPI) ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pronunciation_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      MONGO_URI: mongodb://mongo:27017
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - audio_storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - app_network
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # ── Frontend (React + Vite dev server) ───────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pronunciation_frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - app_network

volumes:
  mysql_data:
  mongo_data:
  audio_storage:

networks:
  app_network:
    driver: bridge
